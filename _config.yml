title: Stimulsoft Reports Documentation
description:
baseurl: "/Stimulsoft.Reports.Class.Reference.JS"
url: "https://stimulsoft.github.io"
sidebar_title: "Class Reference for JS"
exclude_from_menu: []

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

defaults:
